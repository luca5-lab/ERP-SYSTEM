{% extends 'usuarios/dashboard.html' %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 p-4"
                 style="border-radius: 20px; background: rgba(255,255,255,0.95);">

                <div class="text-center">

                    <i class="bi bi-exclamation-triangle-fill text-danger display-3"></i>

                    <h3 class="mt-3 text-danger">
                        ¿Eliminar Proveedor?
                    </h3>

                    <p class="text-muted mt-3">

                        ¿Estás seguro que deseas eliminar a:

                        <strong>
                            {{ proveedor.razon_social }}
                        </strong>
                        ?

                    </p>

                </div>


                <!-- BOTONES -->
                <form method="POST" class="d-flex justify-content-center gap-3 mt-4">

                    {% csrf_token %}

                    <a href="{% url 'lista_proveedores' %}"
                       class="btn btn-outline-secondary">

                        Cancelar
                    </a>

                    <button type="submit"
                            class="btn btn-danger">

                        <i class="bi bi-trash3-fill"></i> Eliminar
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
