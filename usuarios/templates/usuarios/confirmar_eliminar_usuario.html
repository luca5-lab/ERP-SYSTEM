{% extends 'usuarios/dashboard.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow" style="border-radius: 15px;">
        <h2 class="tech-title text-danger">Eliminar Usuario</h2>
        <p>¿Estás seguro de que deseas eliminar al usuario <strong>{{ usuario.username }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'lista_usuarios' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
