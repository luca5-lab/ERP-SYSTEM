{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USBtechspa</title>
    <link rel="icon" type="image/png" href="{% static 'images/icon.png' %}">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        .asteriskField { display: none !important; }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .side-panel {
            background: #121212; 
            width: 450px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            z-index: 2;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .image-panel {
            flex-grow: 1;
            background: url("{% static 'images/fondoo.jpg' %}") no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .image-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
        }

        .tech-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(13, 110, 253, 0.5);
            margin-bottom: 40px;
            text-align: center;
        }

        .card {
            background: transparent;
            border: none;
            color: white;
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white !important;
            padding: 12px;
            border-radius: 8px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #0d6efd;
            box-shadow: 0 0 10px rgba(13, 110, 253, 0.3);
        }

        .form-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .btn-primary {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(45deg, #0d6efd, #00d2ff);
            border: none;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        a { color: #00d2ff; text-decoration: none; }
        a:hover { color: #ffffff; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="side-panel">
            <div class="text-center">
                <h1 class="tech-title h3">USBtech SPA</h1>
            </div>
            
            <div class="card">
                {% block content %}
                {% endblock %}
            </div>
        </div>

        <div class="image-panel"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
