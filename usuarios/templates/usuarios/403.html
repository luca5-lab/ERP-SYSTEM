{% extends 'usuarios/dashboard.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card border-0 shadow-lg p-5 text-center" style="background: rgba(255, 255, 255, 0.9); border-radius: 30px; max-width: 500px;">
        <i class="bi bi-shield-lock-fill text-danger" style="font-size: 5rem;"></i>
        <h1 class="tech-title mt-4">ACCESO EXPIRADO</h1>
        <p class="lead text-secondary">Tu sesión ha cambiado en otra pestaña o el token de seguridad ha caducado.</p>
        
        <div class="alert alert-warning border-0 small">
            <i class="bi bi-info-circle-fill"></i> Para continuar, simplemente refresca la página o vuelve a iniciar sesión.
        </div>

        <a href="{% url 'login_redirect' %}" class="btn btn-primary btn-lg w-100 tech-title" style="font-size: 0.8rem;">
            <i class="bi bi-arrow-clockwise"></i> RECARGAR SISTEMA
        </a>
    </div>
</div>
{% endblock %}
